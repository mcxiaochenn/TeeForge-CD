name: Dev Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp/
          echo "NDK=/tmp/android-ndk-r27d" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version info
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          COMMIT_HASH=$(git rev-parse --short HEAD)

          LATEST_TAG=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            LATEST_TAG="v0.0.0"
          fi

          DEV_VERSION="${LATEST_TAG}-${COMMIT_HASH}"

          echo "version=$DEV_VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "commitHash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Build
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.versionCode }}
        run: |
          echo "Building version=$VERSION code=$VERSION_CODE"

          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module/module.prop
          sed -i "s/^name=.*/name=TeeForge-CD [Dev]/" module/module.prop
          sed -i "s|^updateJson=.*|updateJson=https://teeforge.mcxiaochen.top/files/dev/update/dev.json|" module/module.prop
          sed -i "s/^#define TEEFORGE_VERSION .*/#define TEEFORGE_VERSION \"$VERSION\"/" native/include/teeforge.h
          # config.conf 已从仓库移除，dev 构建动态生成（debug=1）
          # config.conf removed from repo, generate dynamically for dev (debug=1)
          cat > module/config.conf << 'OUTER'
          # TeeForge-CD User Configuration (dev build)
          debug=1
          blhide=1
          blhide_boot=1
          blhide_security=1
          blhide_vendor=1
          blhide_oem=1
          blhide_secureboot=1
          blhide_realme=1
          blhide_recovery=1
          blhide_developer=1
          blhide_selinux=1
          blhide_virtual=1
          blhide_delete=1
          blhide_compact=1
          OUTER

          chmod +x build.sh
          ./build.sh

          chmod +x package.sh
          ./package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teeforge_cd-${{ steps.ver.outputs.version }}
          path: |
            out/teeforge
            out/teeforge_cd-*.zip
          retention-days: 30

      - name: Generate changelog
        run: |
          COMMIT_HASH="${{ steps.ver.outputs.commitHash }}"
          # 写入头部 Write header
          cat > /tmp/CHANGELOG.md << EOF
          ## TeeForge-CD Dev ${{ steps.ver.outputs.version }}

          ### 构建信息 Build Info
          - Version: \`${{ steps.ver.outputs.version }}\`
          - Version Code: \`${{ steps.ver.outputs.versionCode }}\`
          - Commit: \`${COMMIT_HASH}\`

          ### 最近提交 Recent Commits
          EOF
          # 逐行追加 commits（每行加 - 前缀）Append commits with list prefix
          git log --oneline --no-decorate -20 | sed 's/^/- /' >> /tmp/CHANGELOG.md

      - name: Push to page branch
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.versionCode }}
        run: |
          # 克隆 page 分支 Clone page branch
          git clone --branch page --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/page_push
          cd /tmp/page_push

          # 准备 dev 文件 Prepare dev files
          mkdir -p files/dev/update
          cp ${{ github.workspace }}/out/teeforge_cd-*.zip files/dev/teeforge_cd-dev.zip
          cp /tmp/CHANGELOG.md files/dev/CHANGELOG.md

          # 生成 dev.json
          cat > files/dev/update/dev.json << EOF
          {
            "versionCode": $VERSION_CODE,
            "version": "$VERSION",
            "zipUrl": "https://teeforge.mcxiaochen.top/files/dev/teeforge_cd-dev.zip",
            "changelog": "https://teeforge.mcxiaochen.top/files/dev/CHANGELOG.md"
          }
          EOF

          # 推送到 page 分支 Push to page branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/
          git commit -m "dev: $VERSION [auto]" || true
          git push origin page

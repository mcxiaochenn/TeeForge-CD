name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp/
          echo "NDK=/tmp/android-ndk-r27d" >> $GITHUB_ENV

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$COMMIT_COUNT" >> $GITHUB_OUTPUT

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version.outputs.versionCode }}
        run: |
          # 写入版本号 Write version
          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module/module.prop
          sed -i "s/^#define TEEFORGE_VERSION .*/#define TEEFORGE_VERSION \"$VERSION\"/" native/include/teeforge.h

          # 构建
          chmod +x build.sh
          ./build.sh

          # 打包
          chmod +x package.sh
          ./package.sh

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)

          # 写入 Release body 用的 changelog Write release changelog
          cat > /tmp/CHANGELOG.md << EOF
          ## TeeForge-CD ${{ steps.version.outputs.version }}

          ### 构建信息 Build Info
          - Version: \`${{ steps.version.outputs.version }}\`
          - Version Code: \`${{ steps.version.outputs.versionCode }}\`
          - Commit: \`${{ github.sha }}\`

          ### 更新内容 Changes
          EOF
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.version }}" ]; then
            git log --oneline --no-decorate | head -20 | sed 's/^/- /' >> /tmp/CHANGELOG.md
          else
            git log "${PREV_TAG}..HEAD" --oneline --no-decorate | sed 's/^/- /' >> /tmp/CHANGELOG.md
          fi
          cat >> /tmp/CHANGELOG.md << EOF

          ### 安装 Installation
          1. 下载 \`teeforge_cd-${{ steps.version.outputs.version }}.zip\`
          2. 在 Magisk/KernelSU 中安装

          ### 下载 Download
          | 文件 File | 说明 Description |
          |----------|-----------------|
          | teeforge_cd-${{ steps.version.outputs.version }}.zip | Magisk 模块安装包 |
          | teeforge | 独立二进制（调试用）|
          EOF

          # 同时更新仓库中的 CHANGELOG.md（供 CDN 访问）
          # Also update repo CHANGELOG.md (for CDN access)
          cat > CHANGELOG.md << EOF
          ## TeeForge-CD ${{ steps.version.outputs.version }}

          ### 构建信息 Build Info
          - Version: \`${{ steps.version.outputs.version }}\`
          - Version Code: \`${{ steps.version.outputs.versionCode }}\`
          - Commit: \`${{ github.sha }}\`

          ### 更新内容 Changes
          EOF
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.version }}" ]; then
            git log --oneline --no-decorate | head -20 | sed 's/^/- /' >> CHANGELOG.md
          else
            git log "${PREV_TAG}..HEAD" --oneline --no-decorate | sed 's/^/- /' >> CHANGELOG.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: TeeForge-CD ${{ steps.version.outputs.version }}
          body_path: /tmp/CHANGELOG.md
          files: |
            out/teeforge_cd-${{ steps.version.outputs.version }}.zip
            out/teeforge
          draft: false
          prerelease: false

      - name: Push to page branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version.outputs.versionCode }}
        run: |
          # 克隆 page 分支 Clone page branch
          git clone --branch page --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/page_push
          cd /tmp/page_push

          # 准备 CDN 文件 Prepare CDN files
          mkdir -p files/update
          cp ${{ github.workspace }}/CHANGELOG.md files/CHANGELOG.md
          cp ${{ github.workspace }}/out/teeforge_cd-$VERSION.zip files/teeforge_cd-$VERSION.zip

          cat > files/update/release.json << EOF
          {
            "versionCode": $VERSION_CODE,
            "version": "$VERSION",
            "zipUrl": "https://teeforge.mcxiaochen.top/files/teeforge_cd-$VERSION.zip",
            "changelog": "https://teeforge.mcxiaochen.top/files/CHANGELOG.md"
          }
          EOF

          # 推送到 page 分支 Push to page branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/
          git commit -m "release: $VERSION [auto]" || true
          git push origin page

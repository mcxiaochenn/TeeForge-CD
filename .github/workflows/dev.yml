name: Dev Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp/
          echo "NDK=/tmp/android-ndk-r27d" >> $GITHUB_ENV

      - name: Get version info
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          COMMIT_HASH=$(git rev-parse --short HEAD)

          LATEST_TAG=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            LATEST_TAG="v0.0.0"
          fi

          DEV_VERSION="${LATEST_TAG}-${COMMIT_HASH}"

          echo "version=$DEV_VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "commitHash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Build
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.versionCode }}
        run: |
          echo "Building version=$VERSION code=$VERSION_CODE"

          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module/module.prop
          sed -i "s/^name=.*/name=TeeForge-CD [Dev]/" module/module.prop
          sed -i "s/^#define TEEFORGE_VERSION .*/#define TEEFORGE_VERSION \"$VERSION\"/" native/include/teeforge.h
          sed -i "s/^debug=.*/debug=1/" module/config.conf

          chmod +x build.sh
          ./build.sh

          chmod +x package.sh
          ./package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teeforge_cd-${{ steps.ver.outputs.version }}
          path: |
            out/teeforge
            out/teeforge_cd-*.zip
          retention-days: 30

      - name: Generate changelog
        run: |
          LOG=$(git log --oneline --no-decorate -20)
          COMMIT_HASH="${{ steps.ver.outputs.commitHash }}"
          cat > /tmp/CHANGELOG.md << CHANGELOG
          ## TeeForge-CD Dev ${{ steps.ver.outputs.version }}

          ### 构建信息 Build Info
          - Version: \`${{ steps.ver.outputs.version }}\`
          - Version Code: \`${{ steps.ver.outputs.versionCode }}\`
          - Commit: \`${COMMIT_HASH}\`

          ### 最近提交 Recent Commits
          ${LOG}
          CHANGELOG

      - name: Push to dev branch
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.versionCode }}
        run: |
          # 准备 dev 分支内容 Prepare dev branch content
          mkdir -p /tmp/dev_push/update
          cp out/teeforge_cd-*.zip /tmp/dev_push/teeforge_cd-dev.zip
          cp /tmp/CHANGELOG.md /tmp/dev_push/CHANGELOG.md

          # 生成 dev.json（CDN 指向 dev 分支）
          cat > /tmp/dev_push/update/dev.json << EOF
          {
            "versionCode": $VERSION_CODE,
            "version": "$VERSION",
            "zipUrl": "https://cdn.jsdelivr.net/gh/${{ github.repository }}@dev/teeforge_cd-dev.zip",
            "changelog": "https://cdn.jsdelivr.net/gh/${{ github.repository }}@dev/CHANGELOG.md"
          }
          EOF

          # 推送到 dev 分支（orphan，只含构建产物）
          cd /tmp/dev_push
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b dev
          git add .
          git commit -m "dev: $VERSION [auto]"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin dev

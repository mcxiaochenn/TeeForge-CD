# TeeForge-CD Configuration
# 配置文件 [Configuration file]

# 输入：系统包数据库 Input: system package database
packages_xml=/data/system/packages.xml

# 输出：Tricky Store 目标列表 Output: Tricky Store target list
target_txt=/data/adb/tricky_store/target.txt

# Keybox 存储目录 Keybox storage directory
keybox_dir=/data/adb/teeforge/keybox/

# Keybox 源列表 Keybox sources list
sources_conf=/data/adb/teeforge/sources.conf

# ===== 调试设置 Debug Settings =====
# 0: 关闭 Off (默认 default)
# 1: 开启 On（日志写入文件 Logs written to file）
debug=0

# 日志目录 Log directory
log_dir=/data/adb/teeforge/logs/

# ===== 地区设置 Region Settings =====
# auto: 自动检测 [auto-detect]
# cn: 中国大陆 [China mainland]
# global: 海外 [overseas]
region=auto

# ===== 下载设置 Download Settings =====
# 重试次数 Retry count
retry_count=3

# 测速文件大小（字节）Speed test file size (bytes)
speed_test_size=4096

# 中国大陆镜像站 China mainland mirrors
# 用逗号分隔 Comma separated
cn_mirrors=https://gh-proxy.org,https://v4.gh-proxy.org,https://v6.gh-proxy.org,https://cdn.gh-proxy.org,https://gitclone.com/
